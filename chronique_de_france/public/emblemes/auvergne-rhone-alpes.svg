<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Montagne stylisÈe (Alpes + volcan Auvergne) -->
  <rect width="80" height="80" rx="12" fill="#F4A460"/>
  <!-- Montagne principale (Alpes) -->
  <polygon points="40,12 62,56 18,56" fill="#fff" opacity="0.95"/>
  <!-- Neige au sommet -->
  <polygon points="40,12 48,30 32,30" fill="#F4A460"/>
  <!-- Montagne secondaire gauche (volcan) -->
  <polygon points="20,56 10,56 15,40" fill="#fff" opacity="0.7"/>
  <!-- Montagne secondaire droite -->
  <polygon points="60,56 70,56 65,42" fill="#fff" opacity="0.7"/>
  <!-- Sol -->
  <rect x="8" y="56" width="64" height="8" rx="3" fill="#fff" opacity="0.6"/>
</svg>